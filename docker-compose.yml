services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: tagging-system-dev
        depends_on:
            - ollama
        volumes:
            - .:/app
            - /app/node_modules
        command: npm run dev
        environment:
            - NODE_ENV=development
            - OLLAMA_BASE_URL=http://ollama:11434
        networks:
            - tagging-system-network

    ollama:
        build:
            context: .
            dockerfile: Dockerfile.ollama
        container_name: tagging-system-ollama
        volumes:
            - ollama:/root/.ollama
        ports:
            - 11434:11434
        environment:
            - OLLAMA_KEEP_ALIVE=24h
        networks:
            - tagging-system-network

volumes:
    ollama:
        external: false

networks:
    tagging-system-network:
        external: false
